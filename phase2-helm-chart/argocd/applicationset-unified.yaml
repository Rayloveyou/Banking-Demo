# Banking Demo ApplicationSet - apps-in-app pattern
# 3 template types: config, infrastructure, microservices
# Sync waves: -1 (config) → 0 (infra) → 1 (kong) → 2 (services) → 3 (frontend) → 4 (ingress)
---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: banking-demo
  namespace: argocd
  labels:
    app.kubernetes.io/name: banking-demo
spec:
  generators:
    - list:
        elements:
          # Config: namespace, secret, ingress (from charts/common)
          - name: common
            syncWave: "-1"
            prune: false

          # Infrastructure: stateful services + API gateway
          - name: postgres
            syncWave: "0"
            prune: false
          - name: redis
            syncWave: "0"
            prune: false
          - name: kong
            syncWave: "1"
            prune: true

          # Microservices: domain services
          - name: auth-service
            syncWave: "2"
            prune: true
          - name: account-service
            syncWave: "2"
            prune: true
          - name: transfer-service
            syncWave: "2"
            prune: true
          - name: notification-service
            syncWave: "2"
            prune: true
          - name: api-producer
            syncWave: "2"
            prune: true

          # Frontend UI
          - name: frontend
            syncWave: "3"
            prune: true

  template:
    metadata:
      name: banking-demo-{{ .name }}
      annotations:
        argocd.argoproj.io/sync-wave: "{{ .syncWave }}"
    spec:
      project: banking-demo
      source:
        repoURL: https://github.com/Rayloveyou/Banking-Demo.git
        targetRevision: main
        path: phase2-helm-chart/banking-demo/charts/{{ .name }}
        helm:
          releaseName: banking-demo-{{ .name }}
          valueFiles:
            - values.yaml

      destination:
        server: https://kubernetes.default.svc
        namespace: banking

      syncPolicy:
        automated:
          prune: {{ .prune }}
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ApplyOutOfSyncOnly=true
        retry:
          limit: 3
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 1m
