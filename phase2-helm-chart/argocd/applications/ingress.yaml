apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: banking-demo-ingress
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  project: banking-demo
  source:
    repoURL: https://github.com/Rayloveyou/Banking-Demo.git
    targetRevision: main
    path: phase2-helm-chart/banking-demo/charts/common
    helm:
      releaseName: banking-demo-ingress
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: banking
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 1m
