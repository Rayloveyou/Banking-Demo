apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: banking-demo-auth-service
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: banking-demo
  source:
    repoURL: https://github.com/Rayloveyou/Banking-Demo.git
    targetRevision: main
    path: phase2-helm-chart/banking-demo
    helm:
      releaseName: banking-demo-auth-service
      valueFiles:
        - charts/common/values.yaml
        - values-phase1.yaml
      parameters:
        - name: namespace.enabled
          value: "false"
        - name: secret.enabled
          value: "false"
        - name: postgres.enabled
          value: "false"
        - name: redis.enabled
          value: "false"
        - name: kong.enabled
          value: "false"
        - name: auth-service.enabled
          value: "false"
        - name: account-service.enabled
          value: "false"
        - name: transfer-service.enabled
          value: "false"
        - name: notification-service.enabled
          value: "false"
        - name: api-producer.enabled
          value: "false"
        - name: frontend.enabled
          value: "false"
        - name: ingress.enabled
          value: "false"
        - name: auth-service.enabled
          value: "true"

  destination:
    server: https://kubernetes.default.svc
    namespace: banking

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 1m
