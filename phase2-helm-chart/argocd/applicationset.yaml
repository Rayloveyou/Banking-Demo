apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: banking-demo
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - list:
        elements:
          - name: namespace
          - name: postgres
          - name: redis
          - name: kong
          - name: auth-service
          - name: account-service
          - name: transfer-service
          - name: notification-service
          - name: api-producer
          - name: frontend
          - name: ingress

  template:
    metadata:
      name: banking-demo-{{ .name }}
      labels:
        app.kubernetes.io/name: banking-demo
        app.kubernetes.io/component: "{{ .name }}"
    spec:
      project: banking-demo
      source:
        repoURL: https://github.com/Rayloveyou/Banking-Demo.git
        targetRevision: main
        path: phase2-helm-chart/banking-demo
        helm:
          releaseName: banking-demo-{{ .name }}
          valueFiles:
            - charts/common/values.yaml
            - values-phase1.yaml

      destination:
        server: https://kubernetes.default.svc
        namespace: banking

      syncPolicy:
        automated:
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
        retry:
          limit: 3
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 1m
