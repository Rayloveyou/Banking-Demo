# Banking Demo ApplicationSet
# Simplified: All applications load values-phase1.yaml only
# Templates auto-render based on enabled flags in values
---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: banking-demo
  namespace: argocd
  labels:
    app.kubernetes.io/name: banking-demo
spec:
  generators:
    - list:
        elements:
          - name: config
            syncWave: "-1"
          - name: postgres
            syncWave: "0"
          - name: redis
            syncWave: "0"
          - name: rabbitmq
            syncWave: "0"
          - name: kong
            syncWave: "1"
          - name: auth-service
            syncWave: "2"
          - name: account-service
            syncWave: "2"
          - name: transfer-service
            syncWave: "2"
          - name: notification-service
            syncWave: "2"
          - name: api-producer
            syncWave: "2"
          - name: frontend
            syncWave: "3"
          - name: ingress
            syncWave: "4"

  template:
    metadata:
      name: banking-demo-{{ .name }}
      annotations:
        argocd.argoproj.io/sync-wave: "{{ .syncWave }}"
    spec:
      project: banking-demo
      source:
        repoURL: https://github.com/Rayloveyou/Banking-Demo.git
        targetRevision: main
        path: phase2-helm-chart/banking-demo
        helm:
          releaseName: banking-demo-{{ .name }}
          valueFiles:
            - values-phase1.yaml

      destination:
        server: https://kubernetes.default.svc
        namespace: banking

      syncPolicy:
        automated:
          prune: false
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
        retry:
          limit: 3
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 1m
