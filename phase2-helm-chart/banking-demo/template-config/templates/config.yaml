{{- if .Values.secret.enabled }}
---
apiVersion: v1
kind: Secret
metadata:
  name: banking-db-secret
  namespace: {{ .Release.Namespace }}
type: Opaque
stringData:
  POSTGRES_USER: {{ .Values.secret.postgresUser | quote }}
  POSTGRES_PASSWORD: {{ .Values.secret.postgresPassword | quote }}
  POSTGRES_DB: {{ .Values.secret.postgresDb | quote }}
  DATABASE_URL: {{ .Values.secret.databaseUrl | quote }}
  REDIS_URL: {{ .Values.secret.redisUrl | quote }}
{{- end }}

{{- if .Values.kongExternalService.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.kongExternalService.name }}
  namespace: {{ .Release.Namespace }}
spec:
  type: ExternalName
  externalName: {{ .Values.kongExternalService.externalName }}
  ports:
    - port: {{ .Values.kongExternalService.port }}
{{- end }}

{{- if .Values.ingress.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Values.ingress.name }}
  namespace: {{ .Release.Namespace }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          {{- range .Values.ingress.paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ .serviceName }}
                port:
                  number: {{ .servicePort }}
          {{- end }}
{{- end }}
