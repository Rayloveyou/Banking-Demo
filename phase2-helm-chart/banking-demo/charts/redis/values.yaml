# Redis values - merged with parent values via ArgoCD/Helm
redis:
  enabled: true
  replicas: 1
  image:
    repository: redis
    tag: "7-alpine"
    pullPolicy: IfNotPresent
  securityContext:
    pod:
      seccompProfile:
        type: RuntimeDefault
      fsGroup: 999
    container:
      allowPrivilegeEscalation: false
      runAsNonRoot: false
  service:
    port: 6379
    portName: redis
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "200m"
  storage:
    volumeName: redis-storage
    mountPath: /data
    size: 5Gi
    storageClassName: standard
  hook:
    preInstall: false
    preUpgrade: false
    weight: "-5"
  readinessProbe:
    enabled: true
    command: ["redis-cli", "ping"]
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 3
