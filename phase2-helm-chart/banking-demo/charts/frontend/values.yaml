# Frontend values - merged with parent values via ArgoCD/Helm
frontend:
  enabled: true
  replicas: 1
  image:
    repository: datnxdevops/banking-demo-frontend
    tag: v1
    pullPolicy: Always
  securityContext:
    pod:
      seccompProfile:
        type: RuntimeDefault
      fsGroup: 101
    container:
      allowPrivilegeEscalation: false
      runAsNonRoot: false
  service:
    port: 80
    portName: http
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "128Mi"
      cpu: "200m"
  readinessProbe:
    enabled: false
  extraEnv: {}
