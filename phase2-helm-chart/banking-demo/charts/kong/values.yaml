# Kong API Gateway values - merged with parent values via ArgoCD/Helm
kong:
  enabled: true
  replicas: 1
  image:
    repository: kong
    tag: "3.4"
    pullPolicy: IfNotPresent
  proxyPort: 8000
  proxyPortName: proxy
  adminPort: 8001
  adminPortName: admin
  securityContext:
    pod:
      seccompProfile:
        type: RuntimeDefault
    container:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
  service:
    port: 8000
    adminPort: 8001
  configFileName: kong.yml
  configMountPath: /etc/kong
  resources:
    requests:
      memory: "512Mi"
      cpu: "200m"
    limits:
      memory: "1Gi"
      cpu: "1000m"
  env:
    KONG_DATABASE: "off"
    KONG_DECLARATIVE_CONFIG: /etc/kong/kong.yml
    KONG_PROXY_ACCESS_LOG: "off"
    KONG_ADMIN_ACCESS_LOG: "off"
    KONG_LOG_LEVEL: "warn"
    KONG_NGINX_WORKER_PROCESSES: "2"
    KONG_NGINX_WORKER_RLIMIT_NOFILE: "65535"
  readinessProbe:
    enabled: false
    command: ["kong", "health"]
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5

  backends:
    - name: auth-service
      url: http://auth-service:8001
      routes:
        - name: auth-route
          paths:
            - /api/auth
          strip_path: true

    - name: account-service
      url: http://account-service:8002
      routes:
        - name: account-route
          paths:
            - /api/account
          strip_path: true

    - name: transfer-service
      url: http://transfer-service:8003
      routes:
        - name: transfer-route
          paths:
            - /api/transfer
          strip_path: true

    - name: notification-service
      url: http://notification-service:8004
      routes:
        - name: notification-route
          paths:
            - /api/notifications
          strip_path: true
        - name: notification-ws-route
          paths:
            - /ws
          strip_path: false
          protocols:
            - http
            - https

  corsOrigins:
    - http://localhost:3000
  corsCredentials: true
  corsMethods:
    - GET
    - POST
    - PUT
    - DELETE
    - OPTIONS
  corsHeaders:
    - Accept
    - Accept-Version
    - Content-Length
    - Content-MD5
    - Content-Type
    - Date
    - X-Session
