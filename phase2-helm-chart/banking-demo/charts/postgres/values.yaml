# PostgreSQL values - merged with parent values via ArgoCD/Helm
postgres:
  enabled: true
  replicas: 1
  image:
    repository: postgres
    tag: "16"
    pullPolicy: IfNotPresent
  securityContext:
    pod:
      seccompProfile:
        type: RuntimeDefault
      fsGroup: 999
    container:
      allowPrivilegeEscalation: false
      runAsNonRoot: false
  service:
    port: 5432
    portName: postgres
  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  secretRef:
    name: banking-db-secret
    keys:
      user: POSTGRES_USER
      password: POSTGRES_PASSWORD
      db: POSTGRES_DB
  storage:
    volumeName: postgres-storage
    mountPath: /var/lib/postgresql/data
    size: 10Gi
    storageClassName: standard
  hook:
    preInstall: false
    preUpgrade: false
    weight: "-10"
  readinessProbe:
    enabled: true
    user: banking
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
