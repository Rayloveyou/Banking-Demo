# RabbitMQ values - Not deployed in Phase 1
rabbitmq:
  enabled: false
  replicas: 1
  image:
    repository: rabbitmq
    tag: "3.12-management"
    pullPolicy: IfNotPresent
  securityContext:
    pod:
      seccompProfile:
        type: RuntimeDefault
    container:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
  service:
    port: 5672
    portName: amqp
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  readinessProbe:
    enabled: false
