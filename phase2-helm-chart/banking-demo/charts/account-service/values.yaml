# Account Service values - merged with parent values via ArgoCD/Helm
account-service:
  enabled: true
  replicas: 1
  image:
    repository: datnxdevops/banking-demo-account
    tag: v1
    pullPolicy: Always
  secretRef:
    name: banking-db-secret
    keys:
      databaseUrl: DATABASE_URL
      redisUrl: REDIS_URL
  securityContext:
    pod:
      seccompProfile:
        type: RuntimeDefault
    container:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
  service:
    port: 8002
    portName: http
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "300m"
  readinessProbe:
    enabled: true
    path: /health
    port: 8002
    initialDelaySeconds: 10
    periodSeconds: 15
  corsOrigins: http://localhost:3000
  extraEnv: {}
