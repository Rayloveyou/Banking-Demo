# Cấu hình dùng chung — global, namespace, secret, ingress (merge qua ArgoCD valueFiles)
global:
  namespace: banking
  secretName: banking-db-secret
  corsOrigins: "http://localhost:3000"
  imagePullSecrets:
    dockerhub: dockerhub-registry
    gitlab: gitlab-registry

namespace:
  enabled: true

secret:
  enabled: true
  postgresUser: banking
  postgresPassword: bankingpass
  postgresDb: banking
  #databaseUrl: "postgresql://banking:bankingpass@postgres:5432/banking"
  #redisUrl: "redis://redis:6379/0"
  # Phase 5: Postgres HA, Redis HA ở namespace riêng
  databaseUrl: "postgresql://banking:bankingpass@postgres-postgresql-primary.postgres.svc.cluster.local:5432/banking"
  redisUrl: "sentinel://:Mbfs%402025@redis.redis.svc.cluster.local:26379/0/mymaster"

# External Postgres support (DB outside the cluster).
# Password is still read from the existing Secret key POSTGRES_PASSWORD.
externalPostgres:
  enabled: false
  host: "db.example.local"
  port: "5432"
  db: "banking"
  user: "banking"

ingress:
  enabled: true
  className: nginx
  host: npd-banking.co
  name: banking-ingress
  # Phase 5: Kong ở ns kong → dùng ExternalName Service trong ns banking
  paths:
    - path: /
      pathType: Prefix
      serviceName: frontend
      servicePort: 80
    - path: /api
      pathType: Prefix
      serviceName: kong-proxy-ext
      servicePort: 8000
    - path: /ws
      pathType: Prefix
      serviceName: kong-proxy-ext
      servicePort: 8000

# ExternalName Service trỏ tới Kong proxy ở ns kong
kongExternalService:
  enabled: true
  name: kong-proxy-ext
  externalName: kong-kong-proxy.kong.svc.cluster.local
  port: 8000
