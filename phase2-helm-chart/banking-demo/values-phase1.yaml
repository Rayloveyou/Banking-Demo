# Phase 1 Migration Values - Kubernetes Manifests to Helm Charts
# Config migrated from /phase1-docker-to-k8s with datnxdevops images and WebSocket fixes

# ===== Global Settings =====
global:
  secretName: banking-db-secret
  corsOrigins: http://localhost:3000
  namespace: banking

# ===== Namespace =====
namespace:
  enabled: false
  name: banking

# ===== Secrets =====
secret:
  enabled: true
  postgresDb: banking
  postgresUser: banking
  postgresPassword: banking
  databaseUrl: postgresql://banking:banking@postgres:5432/banking
  redisUrl: redis://redis:6379/0

externalPostgres:
  enabled: false

# ===== Auth Service =====
auth-service:
  enabled: true
  replicas: 1
  image:
    repository: datnxdevops/banking-demo-auth
    tag: v1
    pullPolicy: Always
  secretRef:
    name: banking-db-secret
    keys:
      databaseUrl: DATABASE_URL
      redisUrl: REDIS_URL
  securityContext:
    pod:
      seccompProfile:
        type: RuntimeDefault
    container:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
  service:
    port: 8001
    portName: http
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "300m"
  readinessProbe:
    enabled: true
    path: /health
    port: 8001
    initialDelaySeconds: 10
    periodSeconds: 15
  corsOrigins: http://localhost:3000
  extraEnv: {}

# ===== Account Service =====
account-service:
  enabled: true
  replicas: 1
  image:
    repository: datnxdevops/banking-demo-account
    tag: v1
    pullPolicy: Always
  secretRef:
    name: banking-db-secret
    keys:
      databaseUrl: DATABASE_URL
      redisUrl: REDIS_URL
  securityContext:
    pod:
      seccompProfile:
        type: RuntimeDefault
    container:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
  service:
    port: 8002
    portName: http
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "300m"
  readinessProbe:
    enabled: true
    path: /health
    port: 8002
    initialDelaySeconds: 10
    periodSeconds: 15
  corsOrigins: http://localhost:3000
  extraEnv: {}

# ===== Transfer Service =====
transfer-service:
  enabled: true
  replicas: 1
  image:
    repository: datnxdevops/banking-demo-transfer
    tag: v1
    pullPolicy: Always
  secretRef:
    name: banking-db-secret
    keys:
      databaseUrl: DATABASE_URL
      redisUrl: REDIS_URL
  securityContext:
    pod:
      seccompProfile:
        type: RuntimeDefault
    container:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
  service:
    port: 8003
    portName: http
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "300m"
  readinessProbe:
    enabled: true
    path: /health
    port: 8003
    initialDelaySeconds: 10
    periodSeconds: 15
  corsOrigins: http://localhost:3000
  extraEnv: {}

# ===== Notification Service =====
notification-service:
  enabled: true
  replicas: 1
  image:
    repository: datnxdevops/banking-demo-notification
    tag: v1
    pullPolicy: Always
  secretRef:
    name: banking-db-secret
    keys:
      databaseUrl: DATABASE_URL
      redisUrl: REDIS_URL
  securityContext:
    pod:
      seccompProfile:
        type: RuntimeDefault
    container:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
  service:
    port: 8004
    portName: http
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "300m"
  readinessProbe:
    enabled: true
    path: /health
    port: 8004
    initialDelaySeconds: 10
    periodSeconds: 15
  corsOrigins: http://localhost:3000
  extraEnv: {}

# ===== Frontend =====
frontend:
  enabled: true
  replicas: 1
  image:
    repository: datnxdevops/banking-demo-frontend
    tag: v1
    pullPolicy: Always
  securityContext:
    pod:
      seccompProfile:
        type: RuntimeDefault
      fsGroup: 101
    container:
      allowPrivilegeEscalation: false
      runAsNonRoot: false
  service:
    port: 80
    portName: http
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "128Mi"
      cpu: "200m"
  readinessProbe:
    enabled: false
  extraEnv: {}

# ===== API Producer =====
api-producer:
  enabled: true
  replicas: 1
  image:
    repository: datnxdevops/banking-demo-api-producer
    tag: v1
    pullPolicy: Always
  securityContext:
    pod:
      seccompProfile:
        type: RuntimeDefault
    container:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
  service:
    port: 8080
    portName: http
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "300m"
  readinessProbe:
    enabled: true
    path: /health
    port: 8080
    initialDelaySeconds: 10
    periodSeconds: 15
  secretRef:
    name: banking-db-secret
    keys:
      databaseUrl: DATABASE_URL
      redisUrl: REDIS_URL
  rabbitmqSecretRef:
    name: rabbitmq-connection-secret
    key: RABBITMQ_URL
  corsOrigins: http://localhost:3000
  extraEnv: {}

# ===== Kong API Gateway =====
kong:
  enabled: true
  replicas: 1
  image:
    repository: kong
    tag: "3.4"
    pullPolicy: IfNotPresent
  proxyPort: 8000
  proxyPortName: proxy
  adminPort: 8001
  adminPortName: admin
  securityContext:
    pod:
      seccompProfile:
        type: RuntimeDefault
    container:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
  service:
    port: 8000
    adminPort: 8001
  configFileName: kong.yml
  configMountPath: /etc/kong
  resources:
    requests:
      memory: "512Mi"
      cpu: "200m"
    limits:
      memory: "1Gi"
      cpu: "1000m"
  env:
    KONG_DATABASE: "off"
    KONG_DECLARATIVE_CONFIG: /etc/kong/kong.yml
    KONG_PROXY_ACCESS_LOG: "off"
    KONG_ADMIN_ACCESS_LOG: "off"
    KONG_LOG_LEVEL: "warn"
    KONG_NGINX_WORKER_PROCESSES: "2"
    KONG_NGINX_WORKER_RLIMIT_NOFILE: "65535"
  readinessProbe:
    enabled: false
    command: ["kong", "health"]
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5

  # Kong Backends (Services & Routes)
  # IMPORTANT: notification-ws-route has strip_path: false (don't strip /ws for WebSocket)
  backends:
    - name: auth-service
      url: http://auth-service:8001
      routes:
        - name: auth-route
          paths:
            - /api/auth
          strip_path: true

    - name: account-service
      url: http://account-service:8002
      routes:
        - name: account-route
          paths:
            - /api/account
          strip_path: true

    - name: transfer-service
      url: http://transfer-service:8003
      routes:
        - name: transfer-route
          paths:
            - /api/transfer
          strip_path: true

    - name: notification-service
      url: http://notification-service:8004
      routes:
        - name: notification-route
          paths:
            - /api/notifications
          strip_path: true
        - name: notification-ws-route
          paths:
            - /ws
          strip_path: false
          protocols:
            - http
            - https

  # CORS Configuration
  corsOrigins:
    - http://localhost:3000
  corsCredentials: true
  corsMethods:
    - GET
    - POST
    - PUT
    - DELETE
    - OPTIONS
  corsHeaders:
    - Accept
    - Accept-Version
    - Content-Length
    - Content-MD5
    - Content-Type
    - Date
    - X-Session

# ===== PostgreSQL =====
postgres:
  enabled: true
  replicas: 1
  image:
    repository: postgres
    tag: "16"
    pullPolicy: IfNotPresent
  securityContext:
    pod:
      seccompProfile:
        type: RuntimeDefault
      fsGroup: 999
    container:
      allowPrivilegeEscalation: false
      runAsNonRoot: false
  service:
    port: 5432
    portName: postgres
  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  secretRef:
    name: banking-db-secret
    keys:
      user: POSTGRES_USER
      password: POSTGRES_PASSWORD
      db: POSTGRES_DB
  storage:
    volumeName: postgres-storage
    mountPath: /var/lib/postgresql/data
    size: 10Gi
    storageClassName: standard
  hook:
    preInstall: false
    preUpgrade: false
    weight: "-10"
  readinessProbe:
    enabled: true
    user: banking
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5

# ===== Redis =====
redis:
  enabled: true
  replicas: 1
  image:
    repository: redis
    tag: "7-alpine"
    pullPolicy: IfNotPresent
  securityContext:
    pod:
      seccompProfile:
        type: RuntimeDefault
      fsGroup: 999
    container:
      allowPrivilegeEscalation: false
      runAsNonRoot: false
  service:
    port: 6379
    portName: redis
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "200m"
  storage:
    volumeName: redis-storage
    mountPath: /data
    size: 5Gi
    storageClassName: standard
  hook:
    preInstall: false
    preUpgrade: false
    weight: "-5"
  readinessProbe:
    enabled: true
    command: ["redis-cli", "ping"]
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 3

# ===== Ingress =====
ingress:
  enabled: true
  className: nginx
  host: npd-banking.co
  paths:
    - path: /
      pathType: Prefix
      serviceName: frontend
      servicePort: 80
    - path: /api
      pathType: Prefix
      serviceName: kong
      servicePort: 8000
    - path: /ws
      pathType: Prefix
      serviceName: kong
      servicePort: 8000

# ===== Database Migration =====
dbMigration:
  enabled: false

# ===== Smoke Test =====
smokeTest:
  enabled: false

# ===== Kong External Service =====
kongExternalService: false
