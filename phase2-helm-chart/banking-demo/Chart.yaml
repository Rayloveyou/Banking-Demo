apiVersion: v2
name: banking-demo
description: Banking Demo - Helm bootstrap chart (Phase 2). Deploy namespace, infra, gateway, services, frontend and ingress from a single chart.
type: application
version: 0.1.0
appVersion: "1"
keywords:
  - banking
  - microservices
  - kong
  - postgres
  - redis
maintainers: []
kubeVersion: ">=1.24"
dependencies:
  - name: auth-service
    version: 0.1.0
    repository: ""
    condition: auth-service.enabled
  - name: account-service
    version: 0.1.0
    repository: ""
    condition: account-service.enabled
  - name: transfer-service
    version: 0.1.0
    repository: ""
    condition: transfer-service.enabled
  - name: notification-service
    version: 0.1.0
    repository: ""
    condition: notification-service.enabled
  - name: frontend
    version: 0.1.0
    repository: ""
    condition: frontend.enabled
  - name: kong
    version: 0.1.0
    repository: ""
    condition: kong.enabled
  - name: postgres
    version: 0.1.0
    repository: ""
    condition: postgres.enabled
  - name: redis
    version: 0.1.0
    repository: ""
    condition: redis.enabled
  - name: api-producer
    version: 0.1.0
    repository: ""
    condition: api-producer.enabled
  - name: rabbitmq
    version: 0.1.0
    repository: ""
    condition: rabbitmq.enabled
  - name: common
    version: 0.1.0
    repository: ""
    condition: common.enabled
